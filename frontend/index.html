  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pike Hunters</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
      
  <div class="container">
    
    <div class="app-layout">
      

      <aside class="left-panel">
        <div class="weather-panel">
          <h3>Current Weather</h3>
          <div class="weather-search" style="display: flex; gap: 8px; margin-bottom: 15px;">
            <input type="text" id="weather-city-input" placeholder="Enter city..." style="width: 100%; background: transparent; border: none; border-bottom: 1px solid #2f3336; color: white; padding: 4px; outline: none;">
            <button id="weather-search-btn" style="background: none; border: none; cursor: pointer; font-size: 1.1rem;">🔍︎​</button>
          </div>
          <div id="weather-container">Loading...</div>

          <div id="fishing-conditions" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #2f3336;"></div>
        </div>
      </aside>

     <main id="timeline"></main>

      <aside id="leaderboard" class="leaderboard-panel">
        <h2>Top 3 Catches</h2>
        
        <div class="leaderboard-section">
          <h3>Length (cm)</h3>
          <ul id="leaderboard-length"></ul>
        </div>

        <div class="leaderboard-section" style="margin-top: 15px;">
          <h3>Weight (kg)</h3>
          <ul id="leaderboard-weight"></ul>
        </div>
      </aside>
    </div>
  </div>

  <button id="open-btn" class="fab">+</button>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>FishLog</h2>
        <button id="close-btn">&times;</button>
      </div>
      <section class="input-section">
        <input type="text" id="FishName" placeholder="what did you caught?">
        <input type="text" id="location" placeholder="where?">
        <input type="text" id="fishImage" placeholder="paste image URL here (optional)">

        <div style="display: flex; gap: 10px;">
          <input type="number" id="length" placeholder="length (cm)">
          <input type="number" id="weight" placeholder="weight (kg)">
        </div>

        <textarea id="note" placeholder="add a short description.."></textarea>

        <div class="input-footer">
          <button id="add-btn">Add fish</button>
        </div>
      </section>
      
      </div>
  </div>
  
  <script src="script.js"></script>


  </body>
  </html>
